<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Criar Conta - Sportz Sneakers</title>

    <link rel="stylesheet" href="cadastro.css">

</head>


<body>

    <header>

        <img class="logo" src="logo.png" alt="">

        <ul>
            <il><a href="index.html">Início</a></il>
            <il><a href="produtos.html">Produtos</a></il>
            <il><a href="quemsomos.html">Quem somos</a></il>
            <il><a href="contato.html">Contato</a></il>
            
            <div class="icones">
                <a href="carrinho.html">🛒</a>
                <a href="busca.html">🔍</a>
            </div>
        </ul>

    </header>

    <section class="titulo">

        <h1>
            Criar Conta
        </h1>

        <p>
            Cadastre-se e ganhe 10% OFF na primeira compra
        </p>

    </section>


    <section class="formulario">

        <form>

            <label>
                Nome Completo *
            </label>

            <input 
            type="text"
            placeholder="Seu nome completo">


            <div class="grid">

                <div>

                    <label>
                        E-mail *
                    </label>

                    <input
                    type="email"
                    placeholder="seu@email.com">

                </div>


                <div>

                    <label>
                        Telefone *
                    </label>

                    <input
                    type="text"
                    placeholder="(11) 99999-9999">

                </div>


                <div>

                    <label>
                        CPF *
                    </label>

                    <input
                    type="text"
                    placeholder="000.000.000-00">

                </div>


                <div>

                    <label>
                        Data de Nascimento *
                    </label>

                    <input
                    type="text"
                    placeholder="dd/mm/aaaa">

                </div>


                <div>

                    <label>
                        Senha *
                    </label>


                    <div class="senha">

                        <input
                        type="password"
                        placeholder="Mínimo 6 caracteres">

                        <span>
                            ◉
                        </span>
                    </div>
                </div>


                <div>

                    <label>
                        Confirmar Senha *
                    </label>

                    <div class="senha">

                        <input
                        type="password"
                        placeholder="Repita a senha">

                        <span>
                            ◉
                        </span>
                    </div>
                </div>
            </div>

            <div class="check">


                <label>

                    <input type="checkbox">

                    Li e concordo com os 
                    <a href="#">
                        Termos de Uso e a Política de Privacidade
                    </a> *

                </label>






                <label>

                    <input type="checkbox">

                    Desejo receber ofertas exclusivas e novidades por e-mail

                </label>


            </div>


            <button>
                Criar Conta
            </button>
        </form>
    </section>
</body>
</html>
